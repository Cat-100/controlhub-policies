name: Generate HTML and PDF of Policy
run-name: ${{ github.actor }} is exporting the policy to html+pdf

# Only activate on a versioned tag - such as a release, details here @link https://stackoverflow.com/a/69919067/23210156
on:
  push:
    tags:
      - "*-v*.*.*"
  workflow_dispatch:
    inputs:
      policy:
        required: true
        type: choice
        options:
          - privacy-policy
          - return-policy
          - tos-policy

jobs:
  Generate-Docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Unified selector for BOTH tag + manual runs
    env:
      POLICY: ${{ github.event_name == 'workflow_dispatch' && inputs.policy || github.ref_name }}

    steps:
      - run: echo "Job was triggered by a ${{ github.event_name }} event."
      - run: echo "This job is running on a ${{ runner.os }} server hosted by github"
      - run: echo "The current branch that this job is targeting is ${{ github.ref }}"

      # Checkout to the main branch
      - name: Check out repository code
        uses: actions/checkout@v5

      - run: echo "The repo has been cloned to the runner"

      # Install Pandoc
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # Create output directory
      - name: Create output directory
        run: mkdir -p output

      # Privacy Policy
      - name: Build Privacy Policy
        if: contains(env.POLICY, 'privacy-policy')
        run: pandoc legal/privacy_policy.md -o ${{ github.workspace }}/output/privacy_policy.html

      # Return Policy
      - name: Build Return Policy
        if: contains(env.POLICY, 'return-policy')
        run: pandoc legal/return_policy.md -o ${{ github.workspace }}/output/return_policy.html

      # Terms and Conditions
      - name: Build ToS
        if: contains(env.POLICY, 'tos-policy')
        run: pandoc legal/terms_and_conditions.md -o ${{ github.workspace }}/output/terms_and_conditions_policy.html

      # Zip the build output (without including the workspace folder)
      - name: Zip Policy Output
        run: |
          zip release_policies_${{ env.POLICY }}.zip \
            output/privacy_policy.html \
            output/return_policy.html \
            output/terms_and_conditions_policy.html

      # Tarball Build Output
      - name: Tarball Build Output
        run: |
          tar -czvf release_policies_${{ env.POLICY }}.tar.gz \
            output/privacy_policy.html \
            output/return_policy.html \
            output/terms_and_conditions_policy.html

      # Upload the converted files to the release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' # Block to release tags ONLY
        with:
          files: |
            release_policies_${{ env.POLICY }}.zip
            release_policies_${{ env.POLICY }}.tar.gz
